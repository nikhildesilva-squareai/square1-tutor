    <rect x="14" y="14" width="36" height="3.8"/>
    <rect x="14" y="14" width="3.8" height="36"/>
    <rect x="46.2" y="14" width="3.8" height="11.5"/>
    <rect x="14" y="46.2" width="21.6" height="3.8"/>
  </g>
</svg>
